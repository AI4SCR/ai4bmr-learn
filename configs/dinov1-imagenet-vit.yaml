# lightning.pytorch==2.5.1.post0
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: dinov1-sweep
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/dinov1/logs
        log_model: false
        tags: ['dinov1', 'vit']
  callbacks:

    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        # monitor: 'linear_probing/balanced_accuracy'  # problem, we need to log this every epoch to be available
        monitor: 'train_loss_epoch'  # problem, we need to log this every epoch to be available
        save_last: true
    - class_path: ai4bmr_learn.callbacks.LinearProbing.LinearProbing
      init_args:
        target_key: target
        run_before_train: true
        run_after_train: true
        run_every_num_epochs: 3
    - class_path: ai4bmr_learn.callbacks.ImageSamples.DINOImageSamples
      init_args:
        num_samples: 5
    - class_path: ai4bmr_learn.callbacks.UMAP.UMAP
      init_args:
        label_key: target
        run_before_train: true
        run_after_train: true
        run_every_num_epochs: 3
  fast_dev_run: false
  max_epochs: &max_epochs 300
  min_epochs: null
  max_time: 00:01:55:00
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
data:
  class_path: ai4bmr_learn.datamodules.imagenet.ImageNet
  init_args:
    batch_size: &batch_size 64
    num_workers: 16
    persistent_workers: true
    shuffle: true
    pin_memory: true
    train_transform:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: ai4bmr_learn.transforms.dino_transform.DINOTransform
            init_args:
              global_crop_size: &image_size 224
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: &mean [0.485, 0.456, 0.406]
              std: &std [0.229, 0.224, 0.225]
    val_transform:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.RandomResizedCrop
            init_args:
              size: *image_size
              scale: [0.8, 1]
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: *mean
              std: *std
model:
  backbone:
    class_path: ai4bmr_learn.models.backbones.timm.Backbone
    init_args:
      model_name: vit_small_patch16_224
      num_channels: 3
      img_size: 224
      dynamic_img_size: true
  input_dim: 384
  max_epochs: *max_epochs
  lr: 3e-3
  global_batch_size: *batch_size
  warmup_lr_epochs: 5
  weight_decay: 0.04
  betas: [0.9, 0.999]
  teacher_temp: 0.04
  warmup_teacher_temp_epochs: 3
  momentum: 0.996
  momentum_end: 1
  freeze_last_layer: 1
  norm_last_layer: true
  pooling: flatten
optimizer: null
lr_scheduler: null
ckpt_path: null
