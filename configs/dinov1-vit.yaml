# lightning.pytorch==2.5.1.post0
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: dinov1-sweep
#        name: dinov1-cli
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/mae/logs
        log_model: false
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: ai4bmr_learn.callbacks.LinearProbing.LinearProbing
      init_args:
        target_key: target
        run_before_train: true
        run_every_num_epochs: 3
    - class_path: ai4bmr_learn.callbacks.ImageSamples.DINOImageSamples
      init_args:
        num_samples: 5
    - class_path: ai4bmr_learn.callbacks.UMAP.UMAP
      init_args:
        label_key: target
        log_before_train: true
        log_every_num_epochs: 3
  fast_dev_run: false
  max_epochs: 300
  min_epochs: null
  max_time: 00:01:59:00
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
model:
  backbone:
    class_path: ai4bmr_learn.models.backbones.timm.Backbone
    init_args:
      model_name: vit_small_patch16_224
  input_dim: 384
  max_epochs: 300
  lr: 5e-4
  global_batch_size: 64
  warmup_lr_epochs: 5
  weight_decay: 0.02  # 0.01-0.02 for small, default: 0.04
  betas: [0.9, 0.999]  # (0.9, 0.95)
  teacher_temp: 0.04  # 0.06 – 0.07
  warmup_teacher_temp_epochs: 3
  momentum: 0.996  # 0.999
  momentum_end: 1
  freeze_last_layer: 1  # 3
  norm_last_layer: true
  pooling: flatten
data:
  batch_size: 64
  num_workers: 16
  persistent_workers: true
  shuffle: true
  pin_memory: true
optimizer: null
lr_scheduler: null
ckpt_path: null
