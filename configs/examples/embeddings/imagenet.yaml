# lightning.pytorch==2.5.1.post0
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger: null
  callbacks:
    - class_path: ai4bmr_learn.callbacks.save_predictions.SavePredictions
      init_args:
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/tmp
        force: true
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: 2
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
data:
  class_path: ai4bmr_learn.datamodules.imagenet.ImageNet
  init_args:
    batch_size: &batch_size 64
    num_workers: 16
    persistent_workers: true
    shuffle: true
    pin_memory: true
    train_transform: &train_transform
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.RandomResizedCrop
            init_args:
              size: &image_size 224
              scale: [1., 1.]
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: &mean [0.485, 0.456, 0.406]
              std: &std [0.229, 0.224, 0.225]
    val_transform:
      <<: *train_transform
model:
  class_path: ai4bmr_learn.modules.model_builder.ModelBuilder
  init_args:
    path: ai4bmr_learn.models.backbones.timm.Backbone
    batch_key: image
  dict_kwargs:
    model_name: resnet18
    num_channels: 3
    global_pool: avg
    pretrained: true
optimizer: null
lr_scheduler: null
ckpt_path: null
