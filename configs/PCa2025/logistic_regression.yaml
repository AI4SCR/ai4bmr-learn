# lightning.pytorch==2.5.2
seed_everything: true
trainer:
  accelerator: 'cpu'
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: PCa2025
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/logs/PCa2025
        log_model: false
        tags:
          - logistic_regression
  callbacks: null
  fast_dev_run: false
  max_epochs: 1
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  model_registry: null
model:
  class_path: ai4bmr_learn.models.classical.logistic_regression.LogisticRegression
  init_args:
      batch_key: z
      target_key: metadata.disease_progr
      num_classes: 2
data:
  class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoaderCollection
  init_args:
    dataloaders:
      fit:
        - class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoader
          init_args:
            dataset:
              class_path: ai4bmr_learn.datasets.embeddings.Embeddings
              init_args: &fit_kwargs
                data_dir: '/users/amarti51/prometex/data/benchmarking/embeddings/PCa/oee8hrej/fit'
      val:
        - class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoader
          init_args:
            dataset:
              class_path: ai4bmr_learn.datasets.embeddings.Embeddings
              init_args:
                <<: *fit_kwargs
                data_dir: '/users/amarti51/prometex/data/benchmarking/embeddings/PCa/oee8hrej/test'
optimizer: null
lr_scheduler: null
ckpt_path: null
