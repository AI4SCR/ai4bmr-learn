# lightning.pytorch==2.5.2
seed_everything: true
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: PCa2025
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/logs/PCa2025
        log_model: false
        tags: ['clf', 'resnet']
  callbacks:
    - class_path: ai4bmr_learn.callbacks.log_model_stats.LogModelStats
    - class_path: ai4bmr_learn.callbacks.module_checkpoint.ModuleCheckpoint
      init_args:
        module_name: backbone.backbone
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: &monitor val/f1
        mode: &mode max  # "min" for loss, "max" for accuracy, etc.
        save_last: true
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: *monitor
        mode: *mode
        patience: 15
        min_delta: 0.001
  fast_dev_run: false
  max_epochs: 50
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: 00:01:55:00
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: 5
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  model_registry: null
model:
  class_path: ai4bmr_learn.supervised.classification.Classifier
  init_args:
    backbone:
      class_path: ai4bmr_learn.models.backbones.timm.Backbone
      init_args:
        model_name: resnet18
        num_channels: 40
        global_pool: avg
        pretrained: false
    input_dim: 512
    num_classes: 2
    freeze_backbone: false
    lr: 1e-4
    lr_backbone: 1e-5
    weight_decay: 0.04
    pooling: flatten
    batch_key: image
    target_key: metadata.disease_progr
data:
  class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoaderCollection
  init_args:
    dataloaders:
      fit:
        - class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoader
          init_args:
            dataset:
              class_path: ai4bmr_learn.datasets.items.Items
              init_args: &fit_kwargs
                items_path: '/users/amarti51/prometex/data/benchmarking/datasets/PCa/items/items.json'
                metadata_path: '/users/amarti51/prometex/data/benchmarking/datasets/PCa/splits/samples/clf-target=disease_progr.parquet'
                id_key: 'sample_id'
                split: 'fit'
                drop_nan_columns: true
                transform: &train_transform
                  class_path: torchvision.transforms.v2.Compose
                  init_args:
                    transforms:
                      - class_path: torchvision.transforms.v2.ToDtype
                        init_args:
                          dtype: torch.float32
                          scale: false
                      - class_path: torchvision.transforms.v2.RandomResizedCrop
                        init_args:
                          size: &image_size 224
                          scale: [0.8, 1]
                      - class_path: ai4bmr_learn.transforms.wrappers.Normalize
                        init_args:
                          stats_path: /users/amarti51/prometex/data/benchmarking/datasets/PCa/images/filtered/stats.json
          dict_kwargs:
            batch_size: 8
            num_workers: 12
            persistent_workers: true
            shuffle: false
            pin_memory: true
      val:
        - class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoader
          init_args:
            dataset:
              class_path: ai4bmr_learn.datasets.items.Items
              init_args:
                <<: *fit_kwargs
                split: 'val'
          dict_kwargs:
            batch_size: 8
            num_workers: 12
            persistent_workers: true
            shuffle: false
            pin_memory: true
      predict:
        - class_path: ai4bmr_learn.datamodules.dataloader_collection.DataLoader
          init_args:
            dataset:
              class_path: ai4bmr_learn.datasets.items.Items
              init_args:
                <<: *fit_kwargs
                split: 'test'
optimizer: null
lr_scheduler: null
ckpt_path: null
