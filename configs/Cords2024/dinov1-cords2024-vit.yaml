# lightning.pytorch==2.5.1.post0
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: ssl-cords2024
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/dinov1/logs
        log_model: false
        tags: ['dinov1', 'vit']
  callbacks:
    - class_path: ai4bmr_learn.callbacks.log_model_stats.LogModelStats
    - class_path: ai4bmr_learn.callbacks.LinearProbing.LinearProbing
      init_args:
        target_key: target
        run_before_train: true
        run_after_train: false
        run_every_num_epochs: &every_num_epochs 3
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: &monitor train_loss_epoch
        mode: &mode min  # "min" for loss, "max" for accuracy, etc.
        save_last: true
        every_n_epochs: *every_num_epochs
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: train_loss_epoch
        mode: min
        patience: 150
        min_delta: 0.001
    - class_path: ai4bmr_learn.callbacks.UMAP.UMAP
      init_args:
        label_key: target
        run_before_train: true
        run_after_train: false
        run_every_num_epochs: 3
  fast_dev_run: false
  max_epochs: &max_epochs 1500
  min_epochs: null
  max_time: 00:23:55:00
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  gradient_clip_val: null
  accumulate_grad_batches: 16
data:
  class_path: ai4bmr_learn.datamodules.dataset_folder.DatasetFolder
  init_args:
    dataset:
      class_path: ai4bmr_datasets.Cords2024
    target_name: dx_name
    save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/dinov1/datasets
    split_version: ssl
    batch_size: &batch_size 8
    num_workers: 16 # max 24
    persistent_workers: true
    shuffle: true
    pin_memory: true
    train_transform:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: ai4bmr_learn.transforms.dino_transform.DINOTransform
            init_args:
              global_crop_size: &image_size 224
    val_transform:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.RandomResizedCrop
            init_args:
              size: *image_size
              scale: [0.8, 1]
model:
  backbone:
    class_path: ai4bmr_learn.models.backbones.timm.Backbone
    init_args:
      model_name: vit_small_patch16_224
      num_channels: 43
      global_pool: token
      pretrained: false
    dict_kwargs:
      img_size: 224
      dynamic_img_size: true
  max_epochs: *max_epochs
  pooling: flatten
  input_dim: 384
  lr: 3e-3
  global_batch_size: 128  # TODO: link this argument
  warmup_lr_epochs: 3
  weight_decay: 0.04  # 0.01-0.02 for small, default: 0.04
  betas: [0.9, 0.999]  # (0.9, 0.95)
  teacher_temp: 0.08  # 0.04 (default) – 0.07
  warmup_teacher_temp_epochs: 3
  momentum: 0.996  # 0.999
  momentum_end: 1
  freeze_last_layer: 1  # 3
  norm_last_layer: true
optimizer: null
lr_scheduler: null
ckpt_path: null
