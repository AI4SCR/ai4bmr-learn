# lightning.pytorch==2.5.1.post0
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: clf-cords2024
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/logs
        log_model: false
        tags: ['classification', 'GCN']
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: &monitor val/f1-macro
        mode: &mode max  # "min" for loss, "max" for accuracy, etc.
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: *monitor
        mode: *mode
        patience: 25
        min_delta: 0.001
    - class_path: ai4bmr_learn.callbacks.UMAP.UMAP
      init_args:
        label_key: target
        run_before_train: true
        run_after_train: false
        run_every_num_epochs: 3
  fast_dev_run: false
  max_epochs: &max_epochs 300
  min_epochs: null
  max_time: 00:01:55:00
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  accumulate_grad_batches: 4
  gradient_clip_val: null
data:
  class_path: ai4bmr_learn.datamodules.dataset_folder.DatasetFolder
  init_args:
    dataset:
      class_path: ai4bmr_datasets.Cords2024
    target_name: dx_name
    save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/dinov1/datasets
    split_version: clf
    val_transform: null
    train_transform: null
    batch_size: &batch_size 8
    num_workers: 8
    persistent_workers: true
    shuffle: true
    pin_memory: true
    collate_fn:
      class_path: ai4bmr_learn.collators.graph.Graph
      init_args:
        radius: 32
        include_self: true
        stats_path: /work/FAC/FBM/DBC/mrapsoma/prometex/data/dinov1/datasets/Cords2024/images/default/stats.json
        cache_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/dinov1/datasets/Cords2024/graphs/radius_32
model:
  backbone:
    class_path: ai4bmr_learn.models.backbones.geometric.GCN
    init_args:
      num_node_features: 48  # 43 channels + 5 spatial features
      embed_dim: &embed_dim 512
  input_dim: *embed_dim
  num_classes: 2
  freeze_backbone: false
  lr: 1e-4
  weight_decay: 0.04
  pooling: flatten
  batch_key: graph
optimizer: null
lr_scheduler: null
ckpt_path: null
