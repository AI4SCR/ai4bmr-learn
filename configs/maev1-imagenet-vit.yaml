# lightning.pytorch==2.5.1.post0
seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: maev1-sweep
        save_dir: /work/FAC/FBM/DBC/mrapsoma/prometex/data/maev1/logs
        log_model: false
        tags: ['maev1', 'vit']
  callbacks:

    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        # monitor: 'linear_probing/balanced_accuracy'  # problem, we need to log this every epoch to be available
        monitor: 'train_loss_epoch'  # problem, we need to log this every epoch to be available
        save_last: true
    - class_path: ai4bmr_learn.callbacks.ImageSamples.ImageSamples
      init_args:
        num_samples: 5
    - class_path: ai4bmr_learn.callbacks.image_reconstruction.ImageReconstruction
      init_args:
        num_samples: 5
        run_before_train: true
        run_after_train: true
        run_every_num_epochs: 3
    - class_path: ai4bmr_learn.callbacks.LinearProbing.LinearProbing
      init_args:
        target_key: target
        run_before_train: true
        run_after_train: true
        run_every_num_epochs: 3
    - class_path: ai4bmr_learn.callbacks.UMAP.UMAP
      init_args:
        label_key: target
        run_before_train: true
        run_after_train: true
        run_every_num_epochs: 3
  fast_dev_run: false
  max_epochs: &max_epochs 900
  min_epochs: null
  max_time: 00:02:55:00
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  accumulate_grad_batches: 8
  gradient_clip_val: null
data:
  class_path: ai4bmr_learn.datamodules.imagenet.ImageNet
  init_args:
    batch_size: 64
    num_workers: 16
    persistent_workers: true
    shuffle: true
    pin_memory: true
    train_transform:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.RandomResizedCrop
            init_args:
              size: &image_size 224
              scale: [0.666, 1]
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: &mean [0.485, 0.456, 0.406]
              std: &std [0.229, 0.224, 0.225]
    val_transform:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.RandomResizedCrop
            init_args:
              size: *image_size
              scale: [0.8, 1]
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: *mean
              std: *std
model:
  backbone:
    class_path: ai4bmr_learn.models.backbones.timm.MaskedAutoEncoder
    init_args:
      model_name: vit_small_patch16_224
      img_size: 224
      num_channels: 3
      dynamic_img_size: false
  max_epochs: *max_epochs
  pooling: cls
  decoder_kwargs: null
  mask_ratio: 0.75
  lr: 0.00015
  global_batch_size: 512
  weight_decay: 0.04
  betas: [0.9, 0.999]
  warmup_lr_epochs: 5
optimizer: null
lr_scheduler: null
ckpt_path: null
