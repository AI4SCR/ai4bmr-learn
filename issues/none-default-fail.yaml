# config for typing RandomForestClassifier
model:
  n_estimators: 23  # works
  criterion: 'entropy'  # works
  min_samples_split: 4  # works
  max_leaf_nodes: 3  # fails

# config for typing: Any
model:
  class_path: sklearn.ensemble.RandomForestClassifier
  init_args:
    n_estimators: 23  # works
    criterion: 'entropy'  # works
    min_samples_split: 4  # works
    max_leaf_nodes: 3  # works


