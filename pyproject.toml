[tool.poetry]
name = "ai4bmr-learn"
version = "0.1.0"
description = "Collection of learning methods"
authors = ["Adriano Martinelli <adrianom@student.ethz.ch>"]
packages = [{ include = "ai4bmr_learn", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11"
scikit-learn = "*"
zarr = "<3"  # anndata
loguru = "*"
omegaconf = "*"
wandb = "*"
umap-learn = { version = "*", extras = ["plot"] }
scikit-image = "*"
torch = "*"
pyarrow = "*"
torchvision = "*"
torchinfo = "*"
lightning = "*"
matplotlib = "*"
seaborn = "*"
pandas = "*"
einops = "*"
timm = "*"
jsonargparse = { version = "^4.24.1", extras = ["all"] }
pydantic = "^2.6.1"
igraph="*"
leidenalg="*"
geopandas="*"
openslide-bin="*"
openslide-python="*"
lightly="*"

[tool.poetry.group.scanpy.dependencies]
anndata="*"
rapids-singlecell="*"

[tool.poetry.group.dev.dependencies]
black = "*"
pytest = "*"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 120